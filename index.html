    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="hero1">
            <h1>EXPENSE TRACKER</h1>
            <div class="nameField">
                <h3>Name:</h3> <input class = "name" type="text">
            </div>

                <h3>Amount:</h3> <input class = "amt" type="number">

            </div>
            <div class="showexp">

                    <h4>Name:</h1><p class="nameop"></p> 
                </div>
                <br>
                <div class="showamount">
                    <h4>Amount:</h1><p class="amtop"></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
